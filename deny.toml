# cargo-deny configuration

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
unsound = "deny"
yanked = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
]
deny = []
copyleft = "deny"
default = "deny"

[bans]
multiple-versions = "warn"
wildcard-dependencies = "deny"

[sources]
allow-git = []
unknown-registry = "deny"
unknown-git = "deny"
