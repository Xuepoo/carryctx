# cargo-deny configuration
[advisories]
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
allow-git = []
unknown-registry = "deny"
unknown-git = "deny"
